# Tên workflow: Build Release
name: Build Release

# Kích hoạt chạy thủ công từ giao diện GitHub Actions
on:
  workflow_dispatch:

jobs:
  build:
    # Chạy trên máy ảo Ubuntu 22.04
    runs-on: ubuntu-22.04

    steps:
      # Bước 1: Lấy mã nguồn từ nhánh main
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Bước 2: Cài JDK 17 (dùng cho Android SDK)
      - name: Setup JDK 17 for SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Bước 3: Cài Android SDK 34 và build-tools 34.0.0
      - name: Setup Android SDK 34 only
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # Bước 4: Chuyển sang JDK 11 để build (ứng dụng yêu cầu)
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # Bước 5: Cài Gradle 6.9.4 (phiên bản cũ của dự án)
      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      # Bước 6: Ép buộc các thư viện tương thích với Gradle 6
      - name: Force libs for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # Bước 7: Build file APK dạng prodDebug (chưa ký hoặc đã ký debug)
      - name: Build APK prodDebug
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # Bước 8: Giải mã keystore từ secret (đã base64)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # Bước 9: Ký APK bằng apksigner (tự động ghi đè chữ ký debug cũ)
      - name: Sign APK with apksigner
        run: |
          # Tìm đường dẫn file APK vừa build
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "Signing $APK_PATH"
          # Dùng apksigner với keystore đã giải mã và các mật khẩu từ secrets
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK_PATH"

      # Bước 10: Xác minh chữ ký và in thông tin chứng chỉ
      - name: Verify and print certificate
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "=== APK Signature Verification ==="
          # --verbose: hiển thị chi tiết, --print-certs: in thông tin chứng chỉ
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"

      # Bước 11: Upload file APK đã ký lên artifact (có thể tải về)
      - uses: actions/upload-artifact@v4
        with:
          name: main-apk-signed
          path: wallet/build/outputs/apk/prod/debug/*.apk