# =================================================================
# FILE: .github/workflows/build-release.yml
# MỤC ĐÍCH: Build APK từ debug sau đó ký bằng keystore riêng
#            (đã lưu trong GitHub Secrets)
# YÊU CẦU SECRETS:
#   - KEYSTORE_BASE64   : keystore đã mã hóa base64
#   - KEYSTORE_PASSWORD : mật khẩu keystore
#   - KEY_ALIAS         : alias của key
#   - KEY_PASSWORD      : mật khẩu của key (nếu khác)
# OUTPUT: bitcoin-wallet-release.apk (ký bằng key riêng)
# =================================================================

# Tên workflow hiển thị trên GitHub Actions
name: Build Bitcoin Wallet - Signed (Release)

# Chỉ chạy khi người dùng bấm nút "Run workflow" (không tự động)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ----- BƯỚC 1: Lấy mã nguồn -----
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ----- BƯỚC 2: Cài JDK 17 cho Android SDK -----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ----- BƯỚC 3: Cài Android SDK 34 và build-tools 34.0.0 -----
      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- BƯỚC 4: Chuyển về JDK 11 để build -----
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ----- BƯỚC 5: Cài Gradle 6.9.4 -----
      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      # ----- BƯỚC 6: Ép phiên bản thư viện -----
      - name: Force library versions for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # ----- BƯỚC 7: Build APK prodDebug (sẽ có chữ ký debug tạm) -----
      - name: Build prodDebug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # ----- BƯỚC 8: Giải mã keystore từ secret (base64) -----
      - name: Decode Keystore
        run: |
          # Lấy chuỗi base64 từ secret, giải mã và lưu thành file keystore.jks
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "Keystore đã được giải mã thành công."

      # ----- BƯỚC 9: Ký APK bằng apksigner với keystore riêng -----
      - name: Sign APK with private keystore
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "Đang ký APK: $APK_PATH"
          # Gọi apksigner từ build-tools 34.0.0
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \                           # Keystore vừa giải mã
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \  # Mật khẩu keystore
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \          # Alias của key
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \      # Mật khẩu key (nếu có)
            "$APK_PATH"
          echo "APK đã được ký bằng key riêng."

      # ----- BƯỚC 10: Xác minh chữ ký và in thông tin chứng chỉ -----
      - name: Verify and show release certificate
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "=== Xác minh chữ ký release ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"
          # Kết quả mong đợi: DN hiển thị thông tin từ keystore của bạn (CN=MyWallet,...)

      # ----- BƯỚC 11: Đổi tên file thành bitcoin-wallet-release.apk -----
      - name: Rename APK to release
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "$DIR/bitcoin-wallet-release.apk"
          echo "Đã đổi tên thành bitcoin-wallet-release.apk"

      # ----- BƯỚC 12: Upload APK đã ký lên artifact -----
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk