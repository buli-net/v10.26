name: Freeze Bitcoin Wallet 10.26

on:
  workflow_dispatch:

jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v6.9.4/gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-6.9.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          cat > gradlew << 'EOF'
          #!/usr/bin/env sh
          exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"
          EOF
          chmod +x gradlew

      - name: Freeze dependencies
        run: ./gradlew :wallet:dependencies --write-locks --no-daemon

      - name: Collect offline repo
        run: |
          mkdir -p offline-repo
          cp -r $HOME/.gradle/caches/modules-2/files-2.1/* offline-repo/ || true
          tar czf offline-repo.tar.gz offline-repo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-10.26-offline
          path: offline-repo.tar.gz
          retention-days: 30