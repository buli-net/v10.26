name: Freeze Deps
on:
  push:
    branches: [ main ]
jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '11', distribution: 'temurin' }
      - run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v6.9.4/gradle/wrapper/gradle-wrapper.jar
      - run: chmod +x gradlew
      - run: ./gradlew :wallet:dependencies --write-locks
      - run: |
          mkdir -p offline-repo
          cp -r ~/.gradle/caches/modules-2/files-2.1/* offline-repo/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: offline-repo-10.26
          path: offline-repo