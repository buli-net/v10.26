name: freeze
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin

      - name: Restore gradlew
        run: |
          cat > gradlew <<'EOF'
          #!/usr/bin/env sh
          exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"
          EOF
          chmod +x gradlew

      - name: Setup wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://github.com/gradle/gradle/raw/v6.9.4/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-6.9.4-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties

      - name: Download all deps for 10.26
        run: |
          ./gradlew :wallet:dependencies --no-daemon || true
          ./gradlew :wallet:assembleDebug --no-daemon || true

      - name: Collect offline repo
        run: |
          mkdir -p offline-repo
          cp -r $HOME/.gradle/caches/modules-2/files-2.1/* offline-repo/

      - name: Upload
        uses: actions/upload-artifact@v4
        with