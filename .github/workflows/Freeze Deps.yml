name: Freeze Deps
on: workflow_dispatch
jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # <— BẮT BUỘC, nếu không có thì không có gradlew

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew   # <— trên đt hay bị mất quyền

      - name: Write locks
        run: ./gradlew :wallet:dependencies --write-locks

      - name: Copy deps
        run: |
          mkdir -p offline-repo
          cp -r ~/.gradle/caches/modules-2/files-2.1/* offline-repo/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: offline-repo
          path: offline-repo