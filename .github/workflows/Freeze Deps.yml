name: freeze
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: temurin
    - name: make gradlew
      run: |
        echo '#!/bin/sh' > gradlew
        echo 'exec gradle "$@"' >> gradlew
        chmod +x gradlew
    - name: deps
      run: mkdir -p gradle/wrapper && curl -sLo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v6.9.4/gradle/wrapper/gradle-wrapper.jar
    - run: ./gradlew --version