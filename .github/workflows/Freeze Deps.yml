name: Freeze Bitcoin Wallet 10.26
on:
  workflow_dispatch:

jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # TẢI ĐÚNG gradle-wrapper.jar chính thức
      - name: Fix wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-6.9.4-bin.zip -o gradle.zip
          unzip -j gradle.zip "gradle-6.9.4/lib/gradle-wrapper-6.9.4.jar" -d gradle/wrapper
          mv gradle/wrapper/gradle-wrapper-6.9.4.jar gradle/wrapper/gradle-wrapper.jar
          printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-6.9.4-bin.zip\n" > gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Freeze dependencies
        run: ./gradlew :wallet:dependencies --write-locks --no-daemon

      - name: Collect offline repo
        run: |
          mkdir -p offline-repo
          cp -r ~/.gradle/caches/modules-2/files-2.1 offline-repo

      - uses: actions/upload-artifact@v4
        with:
          name: offline-repo-10.26
          path: offline-repo