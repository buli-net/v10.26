name: Freeze Bitcoin Wallet 10.26
on:
  workflow_dispatch:
jobs:
  freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Bitcoin Wallet 10.26
        run: |
          git clone --depth 1 --branch v10.26 https://github.com/bitcoin-wallet/bitcoin-wallet.git .
      
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download all deps
        run: ./gradlew :wallet:dependencies --no-daemon

      - name: Build to force download
        run: ./gradlew :wallet:assembleDebug --no-daemon || true

      - name: Collect offline repo
        run: |
          mkdir -p /tmp/offline
          cp -r $HOME/.gradle/caches/modules-2 /tmp/offline
          cp -r $HOME/.gradle/wrapper /tmp/offline
          tar -czf offline-repo-10.26.tar.gz -C /tmp offline

      - uses: actions/upload-artifact@v4
        with:
          name: offline-repo-10.26
          path: offline-repo-10.26.tar.gz