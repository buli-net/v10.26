# =================================================================
# FILE: .github/workflows/build-release.yml
# MỤC ĐÍCH: Build cả 4 loại APK (devDebug, devRelease, prodDebug, prodRelease)
#            Ký các bản release (devRelease, prodRelease) bằng keystore riêng
# YÊU CẦU SECRETS:
#   - KEYSTORE_BASE64   : keystore đã mã hóa base64
#   - KEYSTORE_PASSWORD : mật khẩu keystore
#   - KEY_ALIAS         : alias của key
#   - KEY_PASSWORD      : mật khẩu của key (nếu khác)
# OUTPUT: 4 file APK
# =================================================================

name: Build Bitcoin Wallet - All Variants

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force library versions for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # ----- BUILD TẤT CẢ 4 BIẾN THỂ -----
      - name: Build all APK variants
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleDevDebug :wallet:assembleDevRelease :wallet:assembleProdDebug :wallet:assembleProdRelease --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # ----- GIẢI MÃ KEYSTORE -----
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "Keystore decoded successfully."

      # ----- KÝ CÁC BẢN RELEASE (devRelease và prodRelease) -----
      - name: Sign devRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/dev/release -name "*.apk" | head -1)
          echo "Signing devRelease: $APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK_PATH"
          echo "devRelease signed."

      - name: Sign prodRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/release -name "*.apk" | head -1)
          echo "Signing prodRelease: $APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK_PATH"
          echo "prodRelease signed."

      # ----- XÁC MINH CHỮ KÝ (tùy chọn) -----
      - name: Verify release signatures
        run: |
          for variant in dev/release prod/release; do
            APK_PATH=$(find wallet/build/outputs/apk/${variant} -name "*.apk" | head -1)
            echo "Verifying $APK_PATH"
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"
          done

      # ----- ĐỔI TÊN CÁC FILE APK CHO DỄ NHẬN BIẾT -----
      - name: Rename APKs
        run: |
          mv wallet/build/outputs/apk/dev/debug/*.apk wallet/build/outputs/apk/dev/debug/bitcoin-wallet-dev-debug.apk
          mv wallet/build/outputs/apk/dev/release/*.apk wallet/build/outputs/apk/dev/release/bitcoin-wallet-dev-release.apk
          mv wallet/build/outputs/apk/prod/debug/*.apk wallet/build/outputs/apk/prod/debug/bitcoin-wallet-prod-debug.apk
          mv wallet/build/outputs/apk/prod/release/*.apk wallet/build/outputs/apk/prod/release/bitcoin-wallet-prod-release.apk

      # ----- UPLOAD TẤT CẢ 4 APK LÊN ARTIFACT -----
      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-apks
          path: |
            wallet/build/outputs/apk/dev/debug/*.apk
            wallet/build/outputs/apk/dev/release/*.apk
            wallet/build/outputs/apk/prod/debug/*.apk
            wallet/build/outputs/apk/prod/release/*.apk