name: Build Bitcoin Wallet (Mainnet & Testnet)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force Guava version via init script
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
              }
            }
          }
          EOF

      - name: Fix Guava version in build.gradle
        run: |
          sed -i "s/implementation 'com.google.guava:guava:33.4.0-android'/implementation 'com.google.guava:guava:31.1-android'/" build.gradle
          echo "✅ Patched build.gradle:"
          grep guava build.gradle || echo "No guava line found"

      - name: Build all APK variants
        run: |
          gradle assembleProdDebug assembleProdRelease assembleDevDebug assembleDevRelease --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f
          echo "Total: $(find . -name "*.apk" | wc -l)"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-apks
          path: "**/build/outputs/apk/**/*.apk"
          if-no-files-found: error