name: Build and Upload APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Find module name from settings.gradle
        id: find_module
        run: |
          if [ -f settings.gradle ]; then
            MODULE=$(grep -E "include\s+':[^']+'" settings.gradle | head -1 | sed "s/.*'\(:[^']*\)'.*/\1/")
            echo "module=$MODULE" >> $GITHUB_OUTPUT
          else
            echo "module=:app" >> $GITHUB_OUTPUT
          fi
          echo "Detected module: ${{ steps.find_module.outputs.module }}"

      - name: Build all variants
        run: |
          MODULE="${{ steps.find_module.outputs.module }}"
          echo "Building for module $MODULE"
          gradle "$MODULE:assembleProdDebug" \
                  "$MODULE:assembleProdRelease" \
                  "$MODULE:assembleDevDebug" \
                  "$MODULE:assembleDevRelease" \
                  --no-daemon --stacktrace
          # Nếu lệnh trên thất bại, workflow sẽ dừng và báo lỗi

      - name: List all APKs
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;
          echo "=== Total count: $(find . -name "*.apk" | wc -l) ==="

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-apks
          path: "**/build/outputs/apk/**/*.apk"
          if-no-files-found: error