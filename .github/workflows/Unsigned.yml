# =================================================================
# FILE: .github/workflows/build-unsigned.yml
# MỤC ĐÍCH: Tạo APK không có chữ ký (unsigned) bằng cách xóa META-INF
#            sau khi build debug. Dùng để ký thủ công sau.
# OUTPUT: bitcoin-wallet-unsigned.apk
# =================================================================

# Tên workflow hiển thị trên GitHub Actions
name: Build Bitcoin Wallet - Unsigned

# Chỉ chạy khi người dùng bấm nút "Run workflow" (không tự động)
on:
  workflow_dispatch:

# Định nghĩa công việc cần thực hiện
jobs:
  build:
    # Máy ảo chạy Ubuntu 22.04 (chuẩn cho build Android)
    runs-on: ubuntu-22.04

    # Các bước thực hiện tuần tự
    steps:
      # ----- BƯỚC 1: Lấy mã nguồn từ repository -----
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main               # Lấy nhánh main
          fetch-depth: 0          # Lấy toàn bộ lịch sử commit (cần cho một số tác vụ)

      # ----- BƯỚC 2: Cài JDK 17 (cần cho Android SDK) -----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin   # Bản phân phối OpenJDK từ Adoptium
          java-version: '17'      # Phiên bản Java 17

      # ----- BƯỚC 3: Cài Android SDK 34 và build-tools 34.0.0 -----
      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          # Các gói cần cài: platform-tools, nền tảng API 34, build-tools 34.0.0
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- BƯỚC 4: Chuyển sang JDK 11 để build (dự án yêu cầu Java 11) -----
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ----- BƯỚC 5: Cài Gradle 6.9.4 (phiên bản Gradle mà dự án đang dùng) -----
      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      # ----- BƯỚC 6: Ép phiên bản thư viện tương thích với Gradle 6 -----
      - name: Force library versions for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # ----- BƯỚC 7: Build APK prodDebug (sẽ có chữ ký debug) -----
      - name: Build prodDebug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # ----- BƯỚC 8: Xóa thư mục META-INF để loại bỏ chữ ký -----
      - name: Remove signature to make unsigned APK
        run: |
          # Tìm file APK vừa tạo
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "Đang xóa META-INF khỏi $APK_PATH"
          # Lệnh zip -d xóa tệp/thư mục bên trong file zip (APK là zip)
          # Xóa toàn bộ thư mục META-INF chứa chữ ký (RSA, SF, MF)
          # || true : không báo lỗi nếu META-INF không tồn tại
          zip -d "$APK_PATH" META-INF/* || true
          echo "APK hiện không còn chữ ký (unsigned)"

      # ----- BƯỚC 9: Đổi tên file để phân biệt -----
      - name: Rename APK to bitcoin-wallet-unsigned.apk
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "$DIR/bitcoin-wallet-unsigned.apk"
          echo "Đã đổi tên thành bitcoin-wallet-unsigned.apk"

      # ----- BƯỚC 10: Upload artifact -----
      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk