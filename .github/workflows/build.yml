name: Build Bitcoin Wallet - main
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 1) JDK 17 để sdkmanager chạy
      - name: Setup JDK 17 for SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34 only
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # 2) Hạ về JDK 11 cho Gradle 6
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force libs for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                force 'com.google.guava:listenablefuture:1.0'
                force 'androidx.viewpager2:viewpager2:1.0.0'
                force 'androidx.core:core:1.12.0'
                force 'androidx.fragment:fragment:1.6.2'
                force 'androidx.activity:activity:1.8.1'
                force 'androidx.lifecycle:lifecycle-livedata:2.6.2'
                force 'androidx.lifecycle:lifecycle-service:2.6.2'
              }
            }
          }
          EOF

      - name: Build APK prodDebug
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: main-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk