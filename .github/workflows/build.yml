name: Build Bitcoin Wallet v10.10
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: bitcoin-wallet/bitcoin-wallet
          ref: v10.10

      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: android-actions/setup-android@v3
        with: {packages: 'platform-tools platforms;android-34 build-tools;34.0.0'}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '11'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '6.9.4'}

      - name: Force AndroidX versions
        run: |
          mkdir -p $HOME/.gradle/init.d
          printf "allprojects{configurations.all{resolutionStrategy{force 'androidx.core:core:1.12.0';force 'androidx.core:core-ktx:1.12.0';force 'androidx.viewpager2:viewpager2:1.0.0';force 'androidx.fragment:fragment:1.3.6';force 'androidx.lifecycle:lifecycle-common:2.3.1';force 'androidx.lifecycle:lifecycle-runtime:2.3.1';force 'androidx.arch.core:core-common:2.1.0';force 'androidx.arch.core:core-runtime:2.1.0'}}}" > $HOME/.gradle/init.d/force.gradle

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle clean :wallet:assembleProdDebug

      - uses: actions/upload-artifact@v4
        with:
          name: BitcoinWallet-v10.10
          path: wallet/build/outputs/apk/prod/debug/*.apk