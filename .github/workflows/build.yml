name: Build Bitcoin Wallet - main
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 17 (main cần JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 platforms;android-35 build-tools;35.0.0 build-tools;34.0.0'

      - name: Setup Gradle 8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK prodDebug
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleProdDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-main-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk
