name: Build Bitcoin Wallet
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force Guava
        run: |
          mkdir -p ~/.gradle/init.d
          echo "allprojects { configurations.all { exclude group:'com.google.guava', module:'listenablefuture'; resolutionStrategy { force 'com.google.guava:guava:31.1-android' } } }" > ~/.gradle/init.d/force.gradle

      - name: Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wallet.jks

      - name: Build
        run: |
          export JAVA_HOME=$JAVA_HOME_11_X64
          ./gradlew :wallet:assembleProdRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/wallet.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: wallet/build/outputs/apk/prod/release/*.apk