name: Build Bitcoin Wallet
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17 for SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force Guava for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          echo "allprojects { configurations.all { exclude group:'com.google.guava', module:'listenablefuture'; resolutionStrategy { force 'com.google.guava:guava:31.1-android' } } }" > ~/.gradle/init.d/force.gradle

      - name: Prepare keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wallet.jks

      - name: Build Prod Release
        run: |
          export JAVA_HOME=$JAVA_HOME_11_X64
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleProdRelease --no-daemon \
            -Pandroid.buildToolsVersion=34.0.0 \
            -Pandroid.injected.signing.store.file=$HOME/wallet.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: wallet/build/outputs/apk/prod/release/*.apk