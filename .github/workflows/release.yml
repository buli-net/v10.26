name: Build APK release
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '11' }
      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '6.9.4' }
      - run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wallet.jks
      - run: |
          gradle :wallet:assembleProdRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/wallet.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/11.0.31-11/x64
      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: wallet/build/outputs/apk/prod/release/*.apk