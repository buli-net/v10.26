name: Sign Debug to Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
        with: { packages: 'platform-tools platforms;android-34 build-tools;34.0.0' }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '11' }
      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '6.9.4' }

      # --- BẢN BUILD XANH CỦA BẠN ---
      - name: Force libs
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
allprojects {
  configurations.all {
    exclude group: 'com.google.guava', module: 'listenablefuture'
    resolutionStrategy {
      force 'com.google.guava:guava:31.1-android'
    }
  }
}
EOF

      - name: Build ProdDebug (đã xanh)
        run: |
          export JAVA_HOME=$JAVA_HOME_11_X64
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0

      # --- KÝ LẠI THÀNH RELEASE ---
      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wallet.jks
          APK_IN=$(find wallet/build/outputs/apk -name "*prod*debug*.apk" | head -1)
          APK_OUT=$HOME/wallet-prod-release.apk
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks $HOME/wallet.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out $APK_OUT $APK_IN

      - uses: actions/upload-artifact@v4
        with:
          name: signed-release
          path: /home/runner/wallet-prod-release.apk