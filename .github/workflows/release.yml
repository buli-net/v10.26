name: Build APK release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17 for SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup Java 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/wallet.jks

      - name: Build signed release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}
        run: |
          ./gradlew :wallet:assembleProdRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/wallet.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-apk
          path: wallet/build/outputs/apk/prod/release/*.apk