name: Build buli-net Bitcoin Wallet
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code from V10.10-buli-fork
        uses: actions/checkout@v4
        with:
          ref: v10.10
          fetch-depth: 0

      - name: Setup JDK 17 (for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Switch to JDK 11 (for Gradle 6.9)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Force compatible AndroidX versions
        run: |
          mkdir -p $HOME/.gradle/init.d
          cat > $HOME/.gradle/init.d/force-androidx.gradle << 'EOF'
          allprojects {
            configurations.all {
              resolutionStrategy {
                force 'androidx.core:core:1.12.0'
                force 'androidx.core:core-ktx:1.12.0'
                force 'androidx.viewpager2:viewpager2:1.0.0'
                force 'androidx.fragment:fragment:1.3.6'
                force 'androidx.lifecycle:lifecycle-common:2.3.1'
                force 'androidx.lifecycle:lifecycle-runtime:2.3.1'
                force 'androidx.arch.core:core-common:2.1.0'
                force 'androidx.arch.core:core-runtime:2.1.0'
              }
            }
          }
          EOF

      - name: Build APK (prodDebug)
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle clean :wallet:assembleProdDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: buli-wallet-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk
          retention-days: 7